<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Virtual — AJAX U Fidelitas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>🛍 Tienda <span>Virtual</span></h1>
    <button id="cart-btn" aria-label="Abrir carrito de compras">
      🛒 Carrito
      <span id="cart-count" style="display:none">0</span>
    </button>
  </header>

  <!-- ===== Barra de controles (búsqueda + filtro) ===== -->
  <section id="controls" aria-label="Controles de búsqueda y filtro">
    <input
      type="search"
      id="search-input"
      placeholder="Buscar productos…"
      aria-label="Buscar productos"
    >
    <select id="category-filter" aria-label="Filtrar por categoría">
      <option value="all">Todas las categorías</option>
    </select>
  </section>

  <!-- ===== Área principal ===== -->
  <main>
    <!-- Estado de carga / error -->
    <div id="status" role="status" aria-live="polite"></div>

    <!-- Grilla de productos (llenada dinámicamente vía AJAX) -->
    <div id="products-grid" aria-label="Productos disponibles" style="display:none"></div>
  </main>

  <!-- ===== Carrito (sidebar) ===== -->
  <div id="cart-overlay" aria-hidden="true"></div>

  <aside id="cart-sidebar" aria-label="Carrito de compras">
    <div id="cart-header">
      <h2>🛒 Tu Carrito</h2>
      <button id="close-cart" aria-label="Cerrar carrito">✕</button>
    </div>

    <div id="cart-items" role="list">
      <!-- Ítems generados por JavaScript -->
    </div>

    <p id="cart-empty">Tu carrito está vacío.</p>

    <div id="cart-footer">
      <div id="cart-total">
        <span>Total:</span>
        <span id="cart-total-amount">$0.00</span>
      </div>
      <button id="checkout-btn" disabled>Finalizar Compra</button>
    </div>
  </aside>

  <!-- ===== Notificación Toast ===== -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- ===== Footer ===== -->
  <footer>
    <p>Proyecto AJAX &mdash; Curso de Desarrollo Web &mdash; <strong>U Fidelitas</strong></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
